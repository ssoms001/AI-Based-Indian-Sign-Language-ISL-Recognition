        </button>

        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav mx-auto">
                <li class="nav-item">
                    <a class="nav-link {% if request.endpoint == 'index' %}active{% endif %}"
                        href="{{ url_for('index') }}">
                        <i class="fas fa-hand-paper me-1"></i> Recognition
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link {% if request.endpoint == 'speech_to_text' %}active{% endif %}"
                        href="{{ url_for('speech_to_text') }}">
                        <i class="fas fa-microphone me-1"></i> Speech
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link {% if request.endpoint == 'test_accuracy' %}active{% endif %}"
                        href="{{ url_for('test_accuracy') }}">
                        <i class="fas fa-bullseye me-1"></i> Test
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link {% if request.endpoint == 'learn' %}active{% endif %}"
                        href="{{ url_for('learn') }}">
                        <i class="fas fa-graduation-cap me-1"></i> Learn
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link {% if request.endpoint == 'collect' %}active{% endif %}"
                        href="{{ url_for('collect') }}">
                        <i class="fas fa-camera me-1"></i> Collect
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link {% if request.endpoint == 'dashboard' %}active{% endif %}"
                        href="{{ url_for('dashboard') }}">
                        <i class="fas fa-chart-bar me-1"></i> Dashboard
                    </a>
                </li>
            </ul>
            <div class="d-flex align-items-center gap-2">
                <button id="theme-toggle" class="btn btn-sm" title="Toggle theme"
                    style="background:none; border:1px solid var(--border); color:var(--text-primary); border-radius:50%; width:36px; height:36px; padding:0;">
                    <i class="fas fa-moon" id="theme-icon"></i>
                </button>
            </div>
        </div>
    </div>
</nav>
<script>
    (function () {
        const toggle = document.getElementById('theme-toggle');
        const icon = document.getElementById('theme-icon');
        if (!toggle || !icon) return;

        const saved = localStorage.getItem('signbridge-theme') || 'dark';
        applyTheme(saved);

        toggle.addEventListener('click', () => {
            const current = document.body.dataset.theme || 'dark';
            const next = current === 'dark' ? 'light' : 'dark';
            applyTheme(next);
            localStorage.setItem('signbridge-theme', next);
        });

        function applyTheme(theme) {
            document.body.dataset.theme = theme;
            if (icon) icon.className = theme === 'light' ? 'fas fa-sun' : 'fas fa-moon';
        }
    })();
</script>
