<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Number Navigator - ISL Game</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.1.3/css/bootstrap.min.css" rel="stylesheet">
    <link href="{{ url_for('static', filename='css/style.css') }}" rel="stylesheet">
    <link href="{{ url_for('static', filename='css/style-game.css') }}" rel="stylesheet">
    {% include 'partials/_head.html' %}
</head>

<body>
    {% include 'partials/_navbar.html' %}

    <div class="container my-4">
        <div class="row mb-3 align-items-center">
            <div class="col-md-6">
                <h2 id="level-title" style="font-family: var(--font-display); font-weight: 700;">Level 1: 1–5</h2>
                <div class="d-flex align-items-center mt-2 gap-2">
                    <i class="fas fa-star" style="color: var(--gold);"></i>
                    <span class="badge bg-success" id="xp-display">XP: 0 / 500</span>
                    <div class="progress" style="width: 150px; height: 8px;">
                        <div class="progress-bar" id="xp-bar" style="width: 0%"></div>
                    </div>
                </div>
            </div>
            <div class="col-md-6 text-md-end">
                <span
                    style="color: var(--accent); font-family: var(--font-display); font-weight: 700; font-size: 1.2em;">
                    <i class="fas fa-trophy"></i> Mastery: <span id="mastery-score">0%</span>
                </span>
            </div>
        </div>

        <div class="row g-3">
            <!-- Current Number -->
            <div class="col-md-3 text-center">
                <div class="card">
                    <div class="card-header">
                        <h5 class="mb-0">Current Number</h5>
                    </div>
                    <div class="card-body">
                        <div class="test-letter-display" id="current-character" style="font-size: 5rem;">1</div>
                        <button class="btn btn-primary w-100 mt-2" id="practice-btn">
                            <i class="fas fa-check me-1"></i> Check Gesture
                        </button>
                        <button class="btn btn-accent w-100 mt-2" id="continuous-btn">
                            <i class="fas fa-sync me-1"></i> Auto Mode
                        </button>
                        <div id="feedback" class="mt-2" style="display: none;">
                            <span id="feedback-text"></span>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Gesture Reference + Webcam -->
            <div class="col-md-6 text-center">
                <div class="card">
                    <div class="card-header">
                        <h5 class="mb-0">Reference & Camera</h5>
                    </div>
                    <div class="card-body">
                        <div class="row">
                            <div class="col-6">
                                <p
                                    style="color: var(--text-muted); font-size: var(--text-xs); text-transform: uppercase;">
                                    Reference</p>
                                <img id="gesture-image" src="{{ url_for('static', filename='gestures/1.png') }}"
                                    alt="Gesture for 1"
                                    style="max-width:100%; max-height:200px; border-radius: var(--radius-lg); border: 2px solid var(--accent);">
                            </div>
                            <div class="col-6">
                                <p
                                    style="color: var(--text-muted); font-size: var(--text-xs); text-transform: uppercase;">
                                    Your Camera</p>
                                <div id="camera-selector" class="mb-1"></div>
                                <video id="webcam" autoplay playsinline muted
                                    style="width:100%; max-height:200px; border-radius: var(--radius-lg); border: 2px solid var(--border); transform: scaleX(-1);"></video>
                            </div>
                        </div>
                        <div class="mt-2" style="color: var(--text-muted); font-size: var(--text-sm);">
                            Detected: <strong id="detected-letter" style="color: var(--primary);">—</strong>
                            <span class="ms-2">Confidence: <strong id="detected-conf"
                                    style="color: var(--accent);">0%</strong></span>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Navigation -->
            <div class="col-md-3">
                <div class="card">
                    <div class="card-header">
                        <h5 class="mb-0">Numbers</h5>
                    </div>
                    <div class="card-body p-2">
                        <div class="d-flex flex-wrap gap-1" id="nav-list"></div>
                        <button class="btn w-100 mt-2" id="restart-btn"
                            style="background:linear-gradient(135deg,#6366f1,#818cf8);color:white;font-weight:600;">
                            <i class="fas fa-redo me-1"></i> Restart Level
                        </button>
                        <button class="btn btn-gold w-100 mt-2" id="next-level-btn" disabled>
                            <i class="fas fa-lock me-1"></i> Unlock Next Level
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.1.3/js/bootstrap.bundle.min.js"></script>
    <script src="{{ url_for('static', filename='js/camera.js') }}"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const navList = document.getElementById('nav-list');
            const currentCharacter = document.getElementById('current-character');
            const gestureImage = document.getElementById('gesture-image');
            const practiceBtn = document.getElementById('practice-btn');
            const feedback = document.getElementById('feedback');
            const feedbackText = document.getElementById('feedback-text');
            const xpDisplay = document.getElementById('xp-display');
            const xpBar = document.getElementById('xp-bar');
            const masteryScore = document.getElementById('mastery-score');
            const levelTitle = document.getElementById('level-title');
            const nextLevelBtn = document.getElementById('next-level-btn');
            const detectedLetter = document.getElementById('detected-letter');
            const detectedConf = document.getElementById('detected-conf');

            const levels = [
                { name: 'Level 1: Counting Basics (1–5)', chars: ['1', '2', '3', '4', '5'], xpRequired: 500 },
                { name: 'Level 2: Higher Numbers (6–9)', chars: ['6', '7', '8', '9'], xpRequired: 400 }
            ];

            // Load saved progress
            let saved = JSON.parse(localStorage.getItem('numbersGameProgress') || '{}');
            let currentLevel = saved.currentLevel || 0;
            let mastery = saved.mastery || {};
            let xp = saved.xp || 0;
            let activeChar = '1';
            let continuousMode = false;
            let continuousInterval = null;

            function saveProgress() {
                localStorage.setItem('numbersGameProgress', JSON.stringify({ currentLevel, mastery, xp }));
            }

            // Client-side camera
            const cam = new SignBridgeCamera('#webcam', {
                fps: 2, mirror: true,
                onCameraReady: () => console.log('Numbers camera ready'),
                onError: (e) => console.error('Camera error:', e)
            });
            await cam.buildCameraSelector('#camera-selector');
            await cam.start();

            function loadLevel(levelIndex) {
                currentLevel = levelIndex;
                const level = levels[levelIndex];
                levelTitle.textContent = level.name;
                navList.innerHTML = '';
                level.chars.forEach(char => {
                    const btn = document.createElement('button');
                    btn.className = 'word-chip' + (mastery[char] ? ' active' : '');
                    btn.setAttribute('data-char', char);
                    btn.innerHTML = char + (mastery[char] ? ' ✓' : '');
                    btn.onclick = () => selectChar(char);
                    navList.appendChild(btn);
                });
                selectChar(level.chars.find(c => !mastery[c]) || level.chars[0]);
                updateUI();
                saveProgress();
            }

            function restartLevel() {
                const level = levels[currentLevel];
                level.chars.forEach(c => { delete mastery[c]; });
                xp = 0;
                loadLevel(currentLevel);
            }

            document.getElementById('restart-btn').addEventListener('click', () => {
                if (confirm('Restart this level? Your progress for this level will be reset.')) {
                    restartLevel();
                }
            });

            function selectChar(char) {
                activeChar = char;
                currentCharacter.textContent = char;
                gestureImage.src = `/static/gestures/${char}.png`;
                gestureImage.alt = 'Gesture for ' + char;
            }

            function isLevelUnlocked(levelIndex) {
                if (levelIndex === 0) return true;
                if (levelIndex >= levels.length) return false;
                return levels[levelIndex - 1].chars.every(c => mastery[c]);
            }

            function updateUI() {
                const level = levels[currentLevel];
                const masteredCount = level.chars.filter(c => mastery[c]).length;
                masteryScore.textContent = Math.round((masteredCount / level.chars.length) * 100) + '%';
                xpDisplay.textContent = `XP: ${xp} / ${level.xpRequired}`;
                xpBar.style.width = `${Math.min(100, (xp / level.xpRequired) * 100)}%`;

                const canAdvance = currentLevel + 1 < levels.length && isLevelUnlocked(currentLevel + 1);
                nextLevelBtn.disabled = !canAdvance;
                nextLevelBtn.innerHTML = canAdvance ?
                    '<i class="fas fa-unlock me-1"></i> Next Level' :
                    '<i class="fas fa-lock me-1"></i> Unlock Next Level';

                navList.querySelectorAll('.word-chip').forEach(btn => {
                    const c = btn.getAttribute('data-char');
                    if (mastery[c]) {
                        btn.innerHTML = c + ' ✓';
                        btn.style.background = 'var(--accent)';
                        btn.style.color = 'white';
                    }
                });
            }

            async function checkGesture() {
                try {
                    const data = await cam.predict();
                    if (!data || data.error) return false;
                    if (data.gesture) {
                        detectedLetter.textContent = data.gesture;
                        detectedConf.textContent = Math.round((data.confidence || 0) * 100) + '%';

                        if (data.gesture === activeChar && (data.confidence || 0) > 0.6) {
                            feedback.style.display = 'block';
                            feedbackText.innerHTML = '<i class="fas fa-check-circle" style="color:var(--primary);"></i> Correct!';
                            feedbackText.style.color = 'var(--primary)';
                            if (!mastery[activeChar]) {
                                mastery[activeChar] = true;
                                xp += 100;
                            }
                            updateUI();
                            saveProgress();
                            setTimeout(() => { feedback.style.display = 'none'; advanceToNext(); }, 1500);
                            return true;
                        } else {
                            feedback.style.display = 'block';
                            feedbackText.innerHTML = `<i class="fas fa-times-circle" style="color:var(--accent);"></i> Detected "${data.gesture}" — need "${activeChar}"`;
                            feedbackText.style.color = 'var(--accent)';
                            setTimeout(() => feedback.style.display = 'none', 2000);
                        }
                    }
                } catch (e) { console.error(e); }
                return false;
            }

            function advanceToNext() {
                const level = levels[currentLevel];
                const idx = level.chars.indexOf(activeChar);
                for (let i = 1; i <= level.chars.length; i++) {
                    const nextIdx = (idx + i) % level.chars.length;
                    if (!mastery[level.chars[nextIdx]]) { selectChar(level.chars[nextIdx]); return; }
                }
                if (currentLevel + 1 < levels.length && isLevelUnlocked(currentLevel + 1)) loadLevel(currentLevel + 1);
            }

            practiceBtn.addEventListener('click', () => checkGesture());

            document.getElementById('continuous-btn').addEventListener('click', () => {
                continuousMode = !continuousMode;
                const btn = document.getElementById('continuous-btn');
                if (continuousMode) {
                    btn.innerHTML = '<i class="fas fa-stop me-1"></i> Stop Auto';
                    btn.style.background = 'var(--gradient-warm)';
                    continuousInterval = setInterval(() => checkGesture(), 1500);
                } else {
                    btn.innerHTML = '<i class="fas fa-sync me-1"></i> Auto Mode';
                    btn.style.background = '';
                    clearInterval(continuousInterval);
                }
            });

            nextLevelBtn.addEventListener('click', () => {
                if (isLevelUnlocked(currentLevel + 1)) loadLevel(currentLevel + 1);
            });

            loadLevel(currentLevel);
        });
    </script>
</body>

</html>
